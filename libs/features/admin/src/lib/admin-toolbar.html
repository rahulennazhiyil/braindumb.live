<div class="flex items-center gap-2">
  <button
    type="button"
    class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-chip border border-border text-text-secondary hover:text-accent-primary hover:border-accent-primary/60 font-mono text-xs uppercase tracking-wider transition-colors disabled:opacity-40"
    [disabled]="disabled()"
    (click)="refresh.emit()"
    aria-label="Refresh"
  >
    <lucide-angular [img]="RefreshCw" [size]="14" aria-hidden="true" />
    <span>refresh</span>
  </button>
  <button
    type="button"
    class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-chip bg-accent-primary text-bg-primary hover:shadow-glow hover:-translate-y-0.5 font-mono text-xs uppercase tracking-wider transition-all disabled:opacity-40"
    [disabled]="disabled()"
    (click)="create.emit()"
  >
    <lucide-angular [img]="Plus" [size]="14" aria-hidden="true" />
    <span>{{ newLabel() }}</span>
  </button>
</div>
