<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rahul E · frontend engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Personal site, D3 playground, and writing from Rahul E — frontend engineer building AI-powered interfaces at Data Unveil." />
    <meta name="theme-color" content="#00f0ff" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script>
      // Pre-Angular theme boot: avoid FOUC on hard reload / non-default themes.
      // Must match THEME_STORAGE_KEY + THEMES in libs/shared/theme.
      (function () {
        try {
          var t = localStorage.getItem('rahul-dev:theme');
          if (t === 'glass' || t === 'terminal' || t === 'print' || t === 'synthwave') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {
          /* storage blocked — default theme applies */
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
