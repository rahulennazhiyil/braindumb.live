<div class="flex flex-col gap-6">
  <div class="flex items-start justify-between flex-wrap gap-4">
    <app-section-heading
      kicker="/admin/inbox"
      title="Inbox"
      [subtitle]="
        unreadCount() === 0
          ? 'All caught up.'
          : unreadCount() + ' unread message' + (unreadCount() === 1 ? '' : 's')
      "
    />
    <app-admin-toolbar
      [disabled]="loading()"
      newLabel="compose"
      (refresh)="refresh()"
      (create)="refresh()"
    />
  </div>

  @if (error(); as e) {
    <p class="font-mono text-xs text-error">
      <span class="text-text-muted">&gt;</span> {{ e }}
    </p>
  }

  @if (loading()) {
    <p class="font-mono text-xs text-text-muted">
      <span class="text-accent-primary">$</span> loading…
    </p>
  } @else if (messages().length === 0) {
    <app-admin-empty
      message="Inbox is empty."
      hint="Messages sent from /contact land here."
    />
  } @else {
    <ul class="flex flex-col divide-y divide-glass-border border border-glass-border rounded-card overflow-hidden">
      @for (m of messages(); track m.id) {
        <li class="flex flex-col">
          <button
            type="button"
            class="p-4 flex items-start justify-between gap-4 text-left hover:bg-bg-elevated/50 transition-colors w-full"
            [attr.aria-expanded]="expandedId() === m.id"
            [attr.aria-controls]="'msg-' + m.id"
            (click)="toggle(m)"
          >
            <div class="flex flex-col gap-1 min-w-0 flex-1">
              <div class="flex items-center gap-2 text-xs font-mono text-text-muted">
                @if (!m.is_read) {
                  <span
                    class="inline-block w-1.5 h-1.5 rounded-full bg-accent-primary"
                    aria-label="Unread"
                  ></span>
                }
                <span>{{ m.name }}</span>
                <span>·</span>
                <span>{{ m.email }}</span>
                <span>·</span>
                <time [attr.datetime]="m.created_at">
                  {{ m.created_at | date: 'MMM d, yyyy, h:mm a' }}
                </time>
              </div>
              <p
                class="font-body text-sm text-text-primary line-clamp-2"
                [class.text-text-secondary]="m.is_read"
              >
                {{ m.message }}
              </p>
            </div>
          </button>

          @if (expandedId() === m.id) {
            <div
              [id]="'msg-' + m.id"
              class="px-4 pb-4 pt-1 flex flex-col gap-3 bg-bg-elevated/30"
            >
              <pre
                class="font-body text-sm text-text-primary whitespace-pre-wrap leading-relaxed"
              >{{ m.message }}</pre>
              <div class="flex items-center gap-2">
                <a
                  [href]="replyHref(m)"
                  class="px-3 py-1.5 rounded-chip bg-accent-primary text-bg-primary hover:shadow-glow font-mono text-xs uppercase tracking-wider"
                >
                  reply via mail
                </a>
                <button
                  type="button"
                  class="px-3 py-1.5 rounded-chip border border-border text-text-secondary hover:text-error hover:border-error/60 font-mono text-xs uppercase tracking-wider"
                  (click)="remove(m)"
                >
                  delete
                </button>
              </div>
            </div>
          }
        </li>
      }
    </ul>
  }
</div>
