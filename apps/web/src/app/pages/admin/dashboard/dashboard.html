<div class="flex flex-col gap-6">
  <app-section-heading
    kicker="/admin"
    title="Dashboard"
    subtitle="Live counts from Supabase. Tap Views for the full insights dashboard."
  />

  @if (error(); as e) {
    <p class="font-mono text-xs text-error">
      <span class="text-text-muted">&gt;</span> {{ e }}
    </p>
  }

  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
    <app-stat-card
      label="Projects"
      [value]="projectCount()"
      [icon]="icons.projects"
      [loading]="loading()"
    />
    <app-stat-card
      label="Feed items"
      [value]="feedCount()"
      [icon]="icons.feed"
      [loading]="loading()"
    />
    <app-stat-card
      label="Unread"
      [value]="unreadCount()"
      [icon]="icons.inbox"
      [loading]="loading()"
    />
    <a routerLink="/admin/visitor-insights" class="block cursor-pointer" aria-label="Open visitor insights">
      <app-stat-card
        label="Views · 7d"
        [value]="viewCount7d() ?? '—'"
        [icon]="icons.insights"
        [loading]="loading()"
        [trend]="viewCount7d() === null ? 'Analytics offline' : 'last 7 days'"
      />
    </a>
  </div>
</div>
