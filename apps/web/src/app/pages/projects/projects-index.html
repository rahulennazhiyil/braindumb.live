<main class="max-w-6xl mx-auto px-4 md:px-6 py-16 flex flex-col gap-8">
  <app-section-heading
    kicker="ls ./projects"
    title="Projects"
    subtitle="Case studies, production work, and side projects. Featured first."
  />

  @if (error(); as e) {
    <p class="font-mono text-xs text-error">
      <span class="text-text-muted">&gt;</span> {{ e }}
    </p>
  }

  @if (loading()) {
    <p class="font-mono text-xs text-text-muted">
      <span class="text-accent-primary">$</span> loading…
    </p>
  } @else if (ordered().length === 0) {
    <div class="glass p-8 text-center flex flex-col gap-2 items-center">
      <span class="font-mono text-xs uppercase tracking-[0.2em] text-text-muted">
        <span class="text-accent-primary">~$</span> ls --empty
      </span>
      <p class="font-body text-sm text-text-secondary">
        No public projects yet. They'll land here as they get written up.
      </p>
    </div>
  } @else {
    <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (p of ordered(); track p.id) {
        @let link = hrefFor(p);
        <li>
          <app-project-card
            [title]="p.title"
            [description]="p.description ?? ''"
            [techTags]="p.tech_tags ?? []"
            [href]="link.href"
            [external]="link.external"
          />
        </li>
      }
    </ul>
  }
</main>
